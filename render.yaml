# Render Blueprint for Kano Event (Next.js + Prisma)
# No database section - uses existing free-tier DB via env var
services:
  - type: web
    name: kano-event
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: node .next/standalone/server.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
