# Render Blueprint for Kano Event (Next.js + Prisma + PostgreSQL)
services:
  - type: web
    name: kano-event
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kano-event-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

databases:
  - name: kano-event-db
    plan: free
